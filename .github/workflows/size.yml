name: Bundle size

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: node scripts/check-size.mjs

      - name: Comment size report on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- kilid-size-report -->';
            let body;
            try {
              body = marker + '\n' + fs.readFileSync('size-report.md', 'utf8');
            } catch {
              body = marker + '\n### 📦 Bundle size\n\nSize check failed to produce a report — see the workflow logs.';
            }
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(
              (c) => c.user.type === 'Bot' && c.body.startsWith(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
